<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>영어 갈틱폰</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f5f5f5;
}

.screen { display: none; }
.active { display: block; }

button {
  padding: 12px 20px;
  margin: 10px;
  font-size: 16px;
  border-radius: 10px;
}

canvas {
  border: 2px solid black;
  background: white;
  touch-action: none;
}

#preview {
  margin: 10px;
}
</style>
</head>

<body>

<div id="start" class="screen active">
  <h1>영어 갈틱폰</h1>
  <button onclick="goPlayer()">시작하기</button>
</div>

<div id="player" class="screen">
  <h2>플레이어 수</h2>
  <button onclick="setPlayers(3)">3명</button>
  <button onclick="setPlayers(4)">4명</button>
</div>

<div id="round" class="screen">
  <h2>라운드</h2>
  <button onclick="setRounds(2)">2</button>
  <button onclick="setRounds(3)">3</button>
  <button onclick="setRounds(4)">4</button>
</div>

<div id="input" class="screen">
  <h2>문장 입력</h2>

  <div id="preview"></div>

  <input id="textInput">
  <p id="warning" style="color:red; display:none;">문장을 입력하세요!</p>

  <button onclick="saveText()">입력</button>
</div>

<div id="pass" class="screen">
  <h2>다음 사람에게 넘기세요</h2>
  <button onclick="nextStep()">넘겼다면 누르기</button>
</div>

<div id="draw" class="screen">
  <h2>그림 그리기</h2>

  <div id="preview"></div>

  <canvas id="canvas" width="300" height="300"></canvas><br>

  <button onclick="setPen()">펜</button>
  <button onclick="setEraser()">지우개</button>
  <button onclick="finishDraw()">완료</button>
</div>

<div id="result" class="screen">
  <h2 id="resultText"></h2>
</div>

<script>
let playerCount = 0;
let roundCount = 0;
let currentRound = 0;
let step = "text";
let chains = [];
let currentPlayer = 0;

function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goPlayer() { show("player"); }

function setPlayers(n) {
  playerCount = n;
  show("round");
}

function setRounds(n) {
  roundCount = n;
  chains = Array.from({length: playerCount}, () => []);
  show("input");
}

function saveText() {
  let text = document.getElementById("textInput").value;

  if (text.trim() === "") {
    let w = document.getElementById("warning");
    w.style.display = "block";
    setTimeout(() => w.style.display = "none", 2000);
    return;
  }

  chains[currentPlayer].push(text);
  document.getElementById("textInput").value = "";
  show("pass");
}

function nextStep() {
  currentPlayer = (currentPlayer + 1) % playerCount;

  let chain = chains[currentPlayer];
  let last = chain[chain.length - 1];

  let preview = document.getElementById("preview");

  if (step === "text") {
    step = "draw";

    preview.innerHTML = `<b>이 문장을 보고 그리세요:</b><br>${last}`;
    show("draw");

  } else {
    step = "text";
    currentRound++;

    if (currentRound >= roundCount) {
      endGame();
      return;
    }

    if (typeof last === "string") {
      preview.innerHTML = "";
    } else {
      preview.innerHTML = `<img src="${last}" width="200">`;
    }

    show("input");
  }
}

function endGame() {
  let first = chains[0][0];
  document.getElementById("resultText").innerText =
    "단어는 '" + first + "' 였습니다!";
  show("result");
}

/* ===== 그림 기능 (모바일 포함) ===== */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;
let lastX = 0;
let lastY = 0;

function getPos(e) {
  if (e.touches) {
    return {
      x: e.touches[0].clientX - canvas.getBoundingClientRect().left,
      y: e.touches[0].clientY - canvas.getBoundingClientRect().top
    };
  }
  return { x: e.offsetX, y: e.offsetY };
}

function startDraw(e) {
  drawing = true;
  let pos = getPos(e);
  lastX = pos.x;
  lastY = pos.y;
}

function endDraw() {
  drawing = false;
}

function draw(e) {
  if (!drawing) return;

  let pos = getPos(e);

  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();

  lastX = pos.x;
  lastY = pos.y;
}

canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mouseup", endDraw);
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", startDraw);
canvas.addEventListener("touchend", endDraw);
canvas.addEventListener("touchmove", draw);

function setPen() {
  ctx.globalCompositeOperation = "source-over";
}

function setEraser() {
  ctx.globalCompositeOperation = "destination-out";
}

function finishDraw() {
  let img = canvas.toDataURL();
  chains[currentPlayer].push(img);

  ctx.clearRect(0,0,canvas.width,canvas.height);
  show("pass");
}
</script>

</body>
</html>
