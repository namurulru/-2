<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>영어 갈틱폰</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; touch-action: manipulation; }
        .screen { display: none; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .active { display: block !important; }
        button { padding: 12px 24px; margin: 8px; font-size: 16px; border-radius: 12px; border: none; background: #007aff; color: white; font-weight: bold; cursor: pointer; }
        button:active { background: #0056b3; }
        canvas { border: 3px solid #333; background: white; touch-action: none; border-radius: 10px; width: 300px; height: 300px; cursor: crosshair; }
        input { padding: 12px; font-size: 18px; border-radius: 10px; border: 1px solid #ddd; width: 85%; margin-bottom: 15px; outline: none; }
        #previewArea { margin: 15px; min-height: 40px; }
        .info-text { color: #666; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="start" class="screen active">
        <h1> 영어 갈틱폰</h1>
        <p>영어 수행평가!</p>
        <button onclick="showScreen('player')">시작하기</button>
    </div>

    <div id="player" class="screen">
        <h2>플레이어 수</h2>
        <button onclick="setPlayers(3)">3명</button>
        <button onclick="setPlayers(4)">4명</button>
    </div>

    <div id="round" class="screen">
        <h2>라운드 선택</h2>
        <p class="info-text">전체 릴레이 횟수입니다.</p>
        <button onclick="setRounds(2)">2라운드</button>
        <button onclick="setRounds(3)">3라운드</button>
        <button onclick="setRounds(4)">4라운드</button>
    </div>

    <div id="input" class="screen">
        <h2 id="inputTitle">첫 문장 입력</h2>
        <div id="textPreview" style="margin-bottom:15px;"></div>
        <input id="textInput" placeholder="여기에 입력하세요...">
        <br>
        <button onclick="saveText()">입력 완료</button>
    </div>

    <div id="pass" class="screen">
        <h2 style="color: #ff9500;"> 폰을 넘기세요!</h2>
        <p>다음 사람에게 전달하고 누르세요.</p>
        <button onclick="renderStep()">준비 완료!</button>
    </div>

    <div id="draw" class="screen">
        <h2>그림 그리기</h2>
        <div id="drawPreview" style="font-weight:bold; font-size:1.2em; margin-bottom:10px;"></div>
        <canvas id="canvas" width="300" height="300"></canvas><br>
        <button onclick="setPen()" style="background:#555">✏️ 펜</button>
        <button onclick="setEraser()" style="background:#888">🧽 지우개</button>
        <button onclick="finishDraw()" style="background:#28a745">그림 완료</button>
    </div>

    <div id="result" class="screen">
        <h2>🏁 게임 결과</h2>
        <div id="finalChain" style="text-align: left; margin: 20px 0; border-top: 1px solid #eee;"></div>
        <button onclick="location.reload()" style="background:#666">다시 하기</button>
    </div>
