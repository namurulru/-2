<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>영어 갈틱폰 완성본 - 드로잉 강화</title>
    <style>
        /* 기본 스타일 */
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; touch-action: manipulation; }
        .screen { display: none; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .active { display: block !important; }
        
        /* 버튼 스타일 */
        button { padding: 12px 20px; margin: 8px; font-size: 16px; border-radius: 12px; border: none; background: #007aff; color: white; font-weight: bold; cursor: pointer; -webkit-appearance: none; }
        button:active { background: #0056b3; }
        
        /* 캔버스 및 입력창 */
        canvas { border: 3px solid #333; background: white; touch-action: none; border-radius: 10px; width: 300px; height: 300px; cursor: crosshair; display: block; margin: 0 auto; }
        input { padding: 12px; font-size: 18px; border-radius: 10px; border: 1px solid #ddd; width: 85%; margin-bottom: 15px; }

        /* 🔥 드로잉 도구 스타일 (새로 추가) */
        .toolbar { margin: 10px auto; width: 300px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        
        /* 색상 팔레트 */
        .color-palette { display: flex; justify-content: center; gap: 5px; margin-top: 5px; }
        .color-box { width: 30px; height: 30px; border-radius: 15px; border: 2px solid #ddd; cursor: pointer; }
        .color-box.active { border-color: #333; transform: scale(1.1); } /* 선택된 색상 강조 */

        /* 도구 버튼 (펜, 지우개) */
        .tool-btn { background: #666; font-size: 14px; padding: 8px 15px; }
        .tool-btn.active { background: #007aff; } /* 선택된 도구 강조 */

        /* 결과 화면 이미지 스타일 */
        #finalChain img { border: 1px solid #eee; margin: 5px; max-width: 200px; }
    </style>
</head>
<body>

    <div id="start" class="screen active">
        <h1>🎮 영어 갈틱폰</h1>
        <p>시작하기 버튼이 안 눌린다면<br>새로고침을 꼭 해주세요!</p>
        <button id="startBtn">시작하기</button>
    </div>

    <div id="player" class="screen">
        <h2>플레이어 수</h2>
        <button onclick="setPlayers(3)">3명</button>
        <button onclick="setPlayers(4)">4명</button>
    </div>

    <div id="round" class="screen">
        <h2>라운드 선택</h2>
        <button onclick="setRounds(2)">2라운드</button>
        <button onclick="setRounds(3)">3라운드</button>
    </div>

    <div id="input" class="screen">
        <h2 id="inputTitle">첫 문장 입력</h2>
        <div id="textPreview"></div>
        <input id="textInput" placeholder="영어 또는 한글 입력...">
        <button onclick="saveText()">입력 완료</button>
    </div>

    <div id="pass" class="screen">
        <h2>📢 폰을 넘기세요!</h2>
        <button onclick="renderStep()">준비 완료</button>
    </div>

    <div id="draw" class="screen">
        <h2>그림 그리기</h2>
        <div id="drawPreview" style="font-weight:bold; margin-bottom:10px;"></div>
        
        <canvas id="canvas" width="300" height="300"></canvas>
        
        <div class="toolbar">
            <div class="tool-btn-group">
                <button id="penBtn" class="tool-btn active" onclick="setPen()">✏️ 펜</button>
                <button id="eraserBtn" class="tool-btn" onclick="setEraser()">🧽 지우개</button>
            </div>
            
            <div class="color-palette">
                <div class="color-box active" style="background: black;" onclick="changeColor('black', this)"></div>
                <div class="color-box" style="background: red;" onclick="changeColor('red', this)"></div>
                <div class="color-box" style="background: blue;" onclick="changeColor('blue', this)"></div>
                <div class="color-box" style="background: green;" onclick="changeColor('green', this)"></div>
                <div class="color-box" style="background: yellow;" onclick="changeColor('yellow', this)"></div>
            </div>
        </div>
        
        <button onclick="finishDraw()" style="background:#28a745; margin-top: 15px;">그림 완료</button>
    </div>

    <div id="result" class="screen">
        <h2>🏁 결과 확인</h2>
        <div id="finalChain" style="text-align:left; margin:20px 0;"></div>
        <button onclick="location.reload()">다시 하기</button>
    </div>

<script>
    // 페이지 로드 후 시작하기 버튼 이벤트 연결 (캐시 문제 방지)
    window.onload = function() {
        console.log("게임 로드 완료");
        const startBtn = document.getElementById('startBtn');
        if(startBtn) {
            startBtn.addEventListener('click', function() {
                showScreen('player');
            });
        }
        // 그림판 초기화 함수 호출
        initCanvas();
    };

    let gameChain = [];
    let totalSteps = 0;
    let currentStep = 0;

    // 화면 전환 함수
    function showScreen(id) {
        const screens = document.querySelectorAll(".screen");
        screens.forEach(s => s.classList.remove("active"));
        const target = document.getElementById(id);
        if(target) target.classList.add("active");
    }

    function setPlayers(n) { showScreen("round"); }
