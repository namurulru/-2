<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영어 갈틱폰</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .screen { display: none; }
        .active { display: block !important; } /* 확실하게 보이도록 함 */
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>

    <div id="start" class="screen active">
        <h1>🎮 영어 갈틱폰</h1>
        <button onclick="nextStep('player')">시작하기</button>
    </div>

    <div id="player" class="screen">
        <h2>플레이어 수를 선택하세요</h2>
        <button onclick="nextStep('round')">3명</button>
        <button onclick="nextStep('round')">4명</button>
    </div>

    <div id="round" class="screen">
        <h2>라운드 수를 선택하세요</h2>
        <button onclick="alert('게임 시작 로직 연결 필요!')">2라운드</button>
    </div>

    <script>
        // 화면 전환 함수
        function nextStep(screenId) {
            console.log("이동할 화면:", screenId); // 확인용 로그
            
            // 모든 화면 숨기기
            const screens = document.querySelectorAll('.screen');
            screens.forEach(s => {
                s.classList.remove('active');
            });

            // 대상 화면 보이기
            const target = document.getElementById(screenId);
            if (target) {
                target.classList.add('active');
            } else {
                console.error("ID가 " + screenId + "인 화면을 찾을 수 없습니다.");
            }
        }
    </script>
</body>
</html>
