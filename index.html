<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>영어 갈틱폰</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; touch-action: manipulation; }
        .screen { display: none; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .active { display: block !important; }
        
        button { padding: 16px 28px; margin: 10px; font-size: 18px; border-radius: 15px; border: none; background: #007aff; color: white; font-weight: bold; cursor: pointer; width: 80%; max-width: 250px; transition: background 0.2s; }
        button:active { background: #0056b3; transform: scale(0.98); }

        canvas { border: 3px solid #333; background: white; touch-action: none; border-radius: 10px; width: 300px; height: 300px; display: block; margin: 10px auto; }
        input { padding: 15px; font-size: 18px; border-radius: 12px; border: 2px solid #ddd; width: 85%; outline: none; transition: border-color 0.3s; }
        
        @keyframes shake {
            0% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }
        .shake { animation: shake 0.4s ease-in-out; border-color: #ff3b30 !important; }
        #warning { color: #ff3b30; font-size: 14px; font-weight: bold; margin-top: 8px; display: none; }

        .toolbar { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .color-box { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ddd; cursor: pointer; }
        .color-box.active { border: 3px solid #007aff; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="start" class="screen active">
        <h1>영어 갈틱폰</h1>
        <p style="color: #666;">영어판 갈틱폰!</p>
        <button id="startBtn">시작하기</button>
    </div>

    <div id="player" class="screen">
        <h2>플레이어 수</h2>
        <button class="player-opt" data-num="3">3명</button>
        <button class="player-opt" data-num="4">4명</button>
    </div>

    <div id="round" class="screen">
        <h2>라운드 선택</h2>
        <button class="round-opt" data-num="2">2라운드</button>
        <button class="round-opt" data-num="3">3라운드</button>
    </div>

    <div id="input" class="screen">
        <h2 id="inputTitle">첫 문장 입력</h2>
        <div id="textPreview" style="margin-bottom: 10px;"></div>
        <input id="textInput" placeholder="문장 또는 단어를 입력하세요!" autocomplete="off">
        <div id="warning">내용을 입력해주세요!</div>
        <br>
        <button id="saveTextBtn">입력 완료</button>
    </div>

    <div id="pass" class="screen">
        <h2 style="color: #ff9500;">다음 사람에게 폰을 넘기세요!</h2>
        <p>다음 사람에게 전달한 뒤<br>아래 버튼을 누르세요.</p>
        <button id="nextPlayerBtn">전달완료</button>
    </div>

    <div id="draw" class="screen">
        <h2>그림 그리기</h2>
        <div id="drawPreview" style="font-weight:bold; margin-bottom:10px; font-size: 1.2em;"></div>
        <canvas id="canvas" width="300" height="300"></canvas>
        <div class="toolbar">
            <button id="penBtn" style="width:auto; background:#555; padding:10px 15px;">펜</button>
            <button id="eraserBtn" style="width:auto; background:#888; padding:10px 15px;">지우개</button>
        </div>
        <div class="toolbar">
            <div class="color-box active" style="background: black;" data-color="black"></div>
            <div class="color-box" style="background: red;" data-color="red"></div>
            <div class="color-box" style="background: blue;" data-color="blue"></div>
            <div class="color-box" style="background: green;" data-color="green"></div>
            <div class="color-box" style="background: orange;" data-color="orange"></div>
        </div>
        <button id="finishDrawBtn" style="background:#28a745; margin-top: 15px;">그림 완료</button>
    </div>

    <div id="result" class="screen">
        <h2>게임 결과</h2>
        <div id="finalChain" style="text-align:left; max-width: 300px; margin: auto;"></div>
        <button onclick="location.reload()" style="background: #666;">다시 하기</button>
    </div>

<script>
    let gameChain = [];
    let totalSteps = 0;
    let currentStep = 0;
    let canvas, ctx;
    let drawing = false;
    let currentColor = 'black';

    function showScreen(id) {
        document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        window.scrollTo(0, 0);
    }

    window.addEventListener('load', function() {
        // 시작하기
        document.getElementById('startBtn').addEventListener('click', () => showScreen('player'));

        // 인원 선택
        document.querySelectorAll('.player-opt').forEach(btn => {
            btn.addEventListener('click', () => showScreen('round'));
        });

        // 라운드 선택
        document.querySelectorAll('.round-opt').forEach(btn => {
            btn.addEventListener('click', (e) => {
                totalSteps = parseInt(e.target.dataset.num) * 2;
                gameChain = [];
                currentStep = 0;
                showScreen('input');
            });
        });

        // 문장 저장 (🔥 흔들림 로직 포함)
        document.getElementById('saveTextBtn').addEventListener('click', saveText);

        // 다음 플레이어 준비
        document.getElementById('nextPlayerBtn').addEventListener('click', renderStep);

        // 그림 완료
        document.getElementById('finishDrawBtn').addEventListener('click', finishDraw);

        // 펜/지우개/색상
        document.getElementById('penBtn').addEventListener('click', setPen);
        document.getElementById('eraserBtn').addEventListener('click', setEraser);
        document.querySelectorAll('.color-box').forEach(box => {
            box.addEventListener('click', (e) => {
                document.querySelectorAll('.color-box').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                changeColor(e.target.dataset.color);
            });
        });

        initCanvas();
    });

    // 🔥 흔들림 및 경고 로직 함수
    function saveText() {
        const input = document.getElementById('textInput');
        const warning = document.getElementById('warning');

        if (!input.value.trim()) {
            // 경고 표시 및 흔들기
            warning.style.display = "block";
            input.classList.add('shake');

            // 2초 뒤에 원래대로 (애니메이션 클래스 제거 포함)
            setTimeout(() => {
                warning.style.display = "none";
                input.classList.remove('shake');
            }, 2000);
            return;
        }

        gameChain.push({ type: 'text', content: input.value });
        input.value = "";
        next();
    }

    function finishDraw() {
        gameChain.push({ type: 'image', content: canvas.toDataURL() });
        ctx.clearRect(0,0,300,300);
        setPen();
        next();
    }

    function next() {
        currentStep++;
        if(currentStep >= totalSteps) endGame();
        else showScreen("pass");
    }

    function renderStep() {
        const last = gameChain[gameChain.length - 1];
        if(last.type === 'text') {
            document.getElementById("drawPreview").innerText = "제시어: " + last.content;
            showScreen("draw");
        } else {
            document.getElementById("inputTitle").innerText = "그림 보고 해석하기";
            document.getElementById("textPreview").innerHTML = `<img src="${last.content}" width="200" style="border:1px solid #ddd">`;
            showScreen("input");
        }
    }

    function endGame() {
        let res = "";
        gameChain.forEach((item, idx) => {
            if(item.type === 'text') {
                res += `<div style="margin-top:20px; color:#007aff; font-weight:bold;">${idx===0?'시작':'해석'}: ${item.content}</div>`;
            } else {
                res += `<img src="${item.content}" width="250" style="border:2px solid #eee; border-radius:10px; margin-top:10px;">`;
            }
        });
        document.getElementById('finalChain').innerHTML = res;
        showScreen('result');
    }

    function initCanvas() {
        canvas = document.getElementById("canvas");
        ctx = canvas.getContext("2d");
        ctx.lineWidth = 4;
        ctx.lineCap = "round";

        const getXY = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return [clientX - rect.left, clientY - rect.top];
        };

        const start = (e) => { drawing = true; ctx.beginPath(); const [x,y] = getXY(e); ctx.moveTo(x,y); };
        const move = (e) => { if(!drawing) return; e.preventDefault(); const [x,y] = getXY(e); ctx.lineTo(x,y); ctx.stroke(); };
        const end = () => { drawing = false; };

        canvas.addEventListener("touchstart", start, {passive:false});
        canvas.addEventListener("touchmove", move, {passive:false});
        canvas.addEventListener("touchend", end);
        canvas.addEventListener("mousedown", start);
        canvas.addEventListener("mousemove", move);
        window.addEventListener("mouseup", end);
    }

    function changeColor(c) { currentColor = c; ctx.strokeStyle = c; setPen(); }
    function setPen() { ctx.globalCompositeOperation = "source-over"; ctx.lineWidth = 4; }
    function setEraser() { ctx.globalCompositeOperation = "destination-out"; ctx.lineWidth = 20; }
</script>
</body>
</html>
